# Runs NPM the `lint` command defined in `package.json` to ensure code quality and adherence to coding standards.
name: NPM Lint

on:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}

      - uses: uniport/workflows/.github/actions/setup-node-and-dependencies@main

      - name: Linters
        run: npm run lint
