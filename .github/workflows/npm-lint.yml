# Runs NPM the `lint` command defined in `package.json` to ensure code quality and adherence to coding standards.
name: NPM Lint

on:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref }}

      - uses: uniport/workflows/.github/actions/setup-node-and-dependencies@main

      - name: Linters
        run: npm run lint
