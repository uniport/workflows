# Workflow for deploying a component version to the DEV environment
name: Deploy DEV
run-name: 'DEV deployment #${{ github.run_number }} triggered by ${{ github.actor }} on ${{ github.ref }}'

on:
  workflow_call:
    secrets:
      UNIPORT_APP_PRIVATE_KEY:
        required: true
    inputs:
      version:
        description: 'The version string'
        required: true
        type: string
      component_name:
        description: 'Portal component name to update its version in the deployment repository'
        required: true
        type: string
      branch:
        description: 'The branch to use in the deployment repository'
        type: string
        default: 'main'
  workflow_dispatch:
    inputs:
      version:
        description: 'The version string'
        required: true
        type: string
      component_name:
        description: 'Portal component name to update its version in the deployment repository'
        required: true
        type: string
      branch:
        description: 'The branch to use in the deployment repository'
        required: true
        type: choice
        options:
          - main
        default: 'main'

jobs:
  deploy:
    name: Deploy (Dev)
    runs-on: ubuntu-latest
    environment:
      name: development
      url: https://ips.inventage.dev/

    steps:
      - name: Validate version format
        uses: uniport/workflows/.github/actions/base/validate-version@main
        with:
          version: ${{ inputs.version }}

      # Generate a token for the Uniport GitHub App
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.UNIPORT_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.UNIPORT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            uniport-deployment

      # Add this to wait for token propagation
      - name: Wait for Token Propagation
        run: sleep 10

      - name: Checkout deployment repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: uniport/uniport-deployment
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ inputs.branch }}
          path: deployment-repo

      - name: Configure Git user
        env:
          ACTOR: ${{ github.actor }}
        run: |
          cd deployment-repo
          git config user.name "$ACTOR"
          git config user.email "$ACTOR@users.noreply.github.com"

      - name: Configure deployment
        env:
          COMPONENT_NAME: ${{ inputs.component_name }}
          VERSION: ${{ inputs.version }}
          BRANCH: ${{ inputs.branch }}
        run: |
          cd deployment-repo
          ./updateVersion.sh "$COMPONENT_NAME" "$VERSION"
          git push origin "$BRANCH"

      - name: Build summary
        env:
          VERSION: ${{ inputs.version }}
          BRANCH: ${{ inputs.branch }}
        run: |
          echo "## Deploy DEV Details" >> $GITHUB_STEP_SUMMARY
          echo "- **version**: \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- **branch**: \`$BRANCH\`" >> $GITHUB_STEP_SUMMARY
