# Workflow for associating components that belong to a Nexus tag
name: '[Shared] Nexus Tag Associate'
run-name: 'Nexus associate tag workflow #${{ github.run_number }} triggered by ${{ github.actor }}'

on:
  workflow_call:
    secrets:
      NEXUS3_PW:
        required: true
    inputs:
      repo_id:
        description: 'The ID of the Nexus repository to search for'
        type: string
        required: true
      version:
        description: 'The version of the components to search for'
        type: string
        required: true
      tag_name:
        description: 'The name of the tag to associate the components with'
        type: string
        required: true
      kind:
        description: 'Component kind for display (e.g. docker, helm, npm)'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      repo_id:
        description: 'The ID of the Nexus repository to search for'
        type: string
        required: true
      version:
        description: 'The version of the components to search for'
        type: string
        required: true
      tag_name:
        description: 'The name of the tag to associate the components with'
        type: string
        required: true

env:
  NEXUS3_URL: ${{ vars.NEXUS3_URL }}
  NEXUS3_USER: ${{ vars.NEXUS3_USER }}

# In Nexus 3.88+, the tags/associate endpoint no longer supports wildcard version patterns (e.g. *-suffix).
# When a wildcard version is passed, the leading wildcard is stripped and the q= keyword parameter is used instead.
jobs:
  associate:
    name: Associate (${{ inputs.kind }})
    runs-on: ubuntu-latest
    steps:
      # https://help.sonatype.com/en/tagging.html
      - name: Associate Components with Nexus Tag
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          REPO_ID: ${{ inputs.repo_id }}
          INPUT_VERSION: ${{ inputs.version }}
          NEXUS3_PW: ${{ secrets.NEXUS3_PW }}
        run: |
          echo "Associating components with tag: $TAG_NAME"
          echo "Associating components in repository '$REPO_ID' with version pattern '$INPUT_VERSION'"

          # If the version starts with a wildcard (e.g. "*-suffix"), strip it and use keyword search (q=)
          # directly on the associate endpoint — Nexus 3.88+ dropped wildcard support on version= but q= works.
          VERSION="$INPUT_VERSION"
          if [[ "$VERSION" == \** ]]; then
            SEARCH_PARAM="q"
            SEARCH_VALUE="${VERSION#\*-}"
          else
            SEARCH_PARAM="version"
            SEARCH_VALUE="$VERSION"
          fi
          echo "Using search parameter: ${SEARCH_PARAM}=${SEARCH_VALUE}"

          HTTP_CODE=$(curl -fSs -w "%{http_code}" -o /tmp/response.json -X POST \
            --user "${{ env.NEXUS3_USER }}:$NEXUS3_PW" \
            "${{ env.NEXUS3_URL }}/service/rest/v1/tags/associate/$TAG_NAME?repository=$REPO_ID&${SEARCH_PARAM}=${SEARCH_VALUE}")

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✓ Successfully associated all components with tag"
            cat /tmp/response.json 2>/dev/null || true
          else
            echo "✗ Failed to associate components (HTTP $HTTP_CODE)"
            cat /tmp/response.json 2>/dev/null || true
            exit 1
          fi
