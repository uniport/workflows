# Workflow for creating a patch branch
name: Git Patch Branch Create

on:
  workflow_call:
    inputs:
      major:
        description: 'The major version in SemVer'
        type: string
        required: true
      minor:
        description: 'The minor version in SemVer'
        type: string
        required: true
      patch:
        description: 'The patch version in SemVer'
        type: string
        required: true
      branch_name:
        description: 'The branch name'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      major:
        description: 'The major version in SemVer'
        type: string
        required: true
      minor:
        description: 'The minor version in SemVer'
        type: string
        required: true
      patch:
        description: 'The patch version in SemVer'
        type: string
        required: true
      branch_name:
        description: 'The branch name'
        type: string
        required: true

jobs:
  create:
    name: Patch Branch Create
    runs-on: ubuntu-latest
    permissions:
      contents: write # create git branch
    steps:
      - name: Setup
        id: setup
        shell: bash
        env:
          MAJOR: ${{ inputs.major }}
          MINOR: ${{ inputs.minor }}
        run: |
          PATCH_BRANCH_NAME="$MAJOR.$MINOR.x"

          cat >> $GITHUB_OUTPUT <<EOF
          PATCH_BRANCH_NAME=$PATCH_BRANCH_NAME
          EOF

      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1 # Fetch only the latest commit
          ref: ${{ inputs.branch_name }}

      - name: Configure Git user
        env:
          ACTOR: ${{ github.actor }}
        run: |
          git config user.name "$ACTOR"
          git config user.email "$ACTOR@users.noreply.github.com"

      - name: Switch to/Create patch branch
        env:
          PATCH_BRANCH_NAME: ${{ steps.setup.outputs.PATCH_BRANCH_NAME }}
        run: |
          git switch "$PATCH_BRANCH_NAME" || git switch --create "$PATCH_BRANCH_NAME"

      - name: Push patch branch
        if: ${{ inputs.patch != '0' }}
        shell: bash
        env:
          PATCH_BRANCH_NAME: ${{ steps.setup.outputs.PATCH_BRANCH_NAME }}
        run: |
          git push origin "$PATCH_BRANCH_NAME"

      - name: Summary
        shell: bash
        env:
          MAJOR: ${{ inputs.major }}
          MINOR: ${{ inputs.minor }}
          PATCH: ${{ inputs.patch }}
          PATCH_BRANCH_NAME: ${{ steps.setup.outputs.PATCH_BRANCH_NAME }}
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Setup
          ### Inputs
          - **major**: \`$MAJOR\`
          - **minor**: \`$MINOR\`
          - **patch**: \`$PATCH\`
          ### Outputs
          - **PATCH_BRANCH_NAME**: \`$PATCH_BRANCH_NAME\`
          EOF
