# [Shared] Build Pipeline
#
# This is the central orchestration workflow for standard Java microservices.
# It encapsulates the entire CI/CD lifecycle from compilation to artifact tagging.
#
# Domain: CI/CD Orchestration
# Contract: Expects a Maven-based project structure.
# Internal Flow:
#   1. Maven Build & Test -> 2. Optional DEV Deployment -> 3. Optional Archetype Sync -> 4. Artifact Tagging
#   5. SBOM Generation & Attestation (default branch and X.Y.x maintenance branches only)
#
# Downstream: Calls shared-maven-build.yml, shared-deploy-dev.yml, shared-update-archetype.yml, shared-nexus-tag-artifacts.yml,
#             and the base actions generate-sbom / upload-sbom-dependency-track.

name: '[Shared] Build Pipeline'
run-name: 'Build & release "${{ inputs.component_name }}" (#${{ github.run_number }}) by ${{ github.actor }} on ${{ github.ref_name }}'

on:
  workflow_call:
    inputs:
      # === Required ===
      component_name:
        description: 'Component name for deployment and archetype'
        required: true
        type: string
      java_version:
        description: 'Java version used for the build'
        required: true
        type: string

      # === Deployment Options ===
      deploy_to_dev:
        description: 'Deploy to development environment'
        required: false
        type: boolean
        default: true # Policy: Deploy to IPS-DEV by default on master/push
      deployment_branch:
        description: 'The branch to use in the uniport-deployment repository'
        type: string
        default: 'main'

      # === Frontend ===
      has_frontend:
        description: 'Whether the component includes a frontend'
        required: false
        type: boolean
        default: false
      maven_verbose:
        description: 'Enable Maven debug logging (-e -X)'
        required: false
        type: boolean
        default: false

      # === NPM Options ===
      needs_npm_access:
        description: 'If the builds needs to read/write to the npm repo'
        required: false
        type: boolean
        default: false
      npmrc_path:
        description: 'Path to the .npmrc file for NPM authentication'
        required: false
        type: string
        default: 'frontend/src/main/web/.npmrc'

      # === Archetype Options ===
      update_archetype:
        description: 'Update the Uniport archetype after a successful build'
        required: false
        type: boolean
        default: true # Policy: Keep archetype blueprint in sync with latest master changes

      # === Timeout ===
      timeout_minutes:
        description: 'Build timeout in minutes'
        required: false
        type: number
        default: 60

      # === SBOM & Supply Chain ===
      generate_sbom:
        description: 'Generate a CycloneDX SBOM, attest it via cosign, and upload it to Dependency-Track'
        required: false
        type: boolean
        default: true
      sbom_npm_path:
        description: 'Path to the npm project included in the SBOM (only used when has_frontend is true)'
        required: false
        type: string
        default: 'frontend/src/main/web'
      sbom_ref_pattern:
        description: 'Branch name regex (ERE) allowed to attest and upload to Dependency-Track, in addition to the default branch'
        required: false
        type: string
        default: '^[0-9]+\.[0-9]+\.x$' # X.Y.x maintenance branches

      # === Tagging Options ===
      tag_docker:
        description: 'Tag Docker artifacts'
        required: false
        type: boolean
        default: true
      tag_maven:
        description: 'Tag Maven artifacts'
        required: false
        type: boolean
        default: true
      tag_npm:
        description: 'Tag NPM artifacts'
        required: false
        type: boolean
        default: false
      tag_helm:
        description: 'Tag Helm artifacts'
        required: false
        type: boolean
        default: false
    outputs:
      VERSION:
        description: 'Forwarded artifact version from Maven job'
        value: ${{ jobs.maven.outputs.VERSION }}
    secrets:
      NEXUS3_PW:
        required: true # Used for Maven deployment and Nexus tagging
      NEXUS_NPM_TOKEN_READ_ONLY:
        required: true # Used for fetching internal NPM dependencies
      MACDUFF_KEYCHAIN_PASSWORD:
        required: true # Required for code signing on macOS runners
      UNIPORT_APP_PRIVATE_KEY:
        required: true # Required for pushing to protected deployment/archetype repos
      NEXUS_NPM_TOKEN_WRITE:
        required: false # Only required if project publishes NPM artifacts
      COSIGN_PRIVATE_KEY:
        required: false # SBOM/provenance attestation is skipped with a notice when absent
      COSIGN_PASSWORD:
        required: false # Password for COSIGN_PRIVATE_KEY
      DEPENDENCY_TRACK_API_KEY:
        required: false # Dependency-Track upload is skipped with a notice when absent

# Concurrency Strategy:
# Prevents redundant builds by canceling outdated runs within the same context.
#
# Examples:
# 1. Normal Push (e.g., to 'master' branch):
#    - Result: New pushes to 'master' cancel any currently running 'master' builds.
#
# 2. Pull Request (e.g., Dependabot PR):
#    - Result: Each PR has a unique 'head_ref', allowing multiple PRs to build in parallel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}
  cancel-in-progress: true

jobs:
  maven:
    name: Maven
    uses: ./.github/workflows/shared-maven-build.yml
    with:
      java_version: ${{ inputs.java_version }}
      has_frontend: ${{ inputs.has_frontend }}
      maven_verbose: ${{ inputs.maven_verbose }}
      needs_npm_access: ${{ inputs.needs_npm_access }}
      npmrc_path: ${{ inputs.npmrc_path }}
      timeout_minutes: ${{ inputs.timeout_minutes }}
    secrets:
      NEXUS3_PW: ${{ secrets.NEXUS3_PW }}
      NEXUS_NPM_TOKEN_READ_ONLY: ${{ secrets.NEXUS_NPM_TOKEN_READ_ONLY }}
      MACDUFF_KEYCHAIN_PASSWORD: ${{ secrets.MACDUFF_KEYCHAIN_PASSWORD }}
      NEXUS_NPM_TOKEN_WRITE: ${{ secrets.NEXUS_NPM_TOKEN_WRITE }}

  deploy_dev:
    name: Deploy
    if: ${{ inputs.deploy_to_dev }}
    needs: [maven]
    uses: ./.github/workflows/shared-deploy-dev.yml
    with:
      version: ${{ needs.maven.outputs.VERSION }}
      component_name: ${{ inputs.component_name }}
      branch: ${{ inputs.deployment_branch }}
    secrets:
      UNIPORT_APP_PRIVATE_KEY: ${{ secrets.UNIPORT_APP_PRIVATE_KEY }}

  update_archetype:
    name: Update Archetype
    if: ${{ inputs.update_archetype }}
    needs: [maven]
    uses: ./.github/workflows/shared-update-archetype.yml
    with:
      version: ${{ needs.maven.outputs.VERSION }}
      component_name: ${{ inputs.component_name }}
    secrets:
      UNIPORT_APP_PRIVATE_KEY: ${{ secrets.UNIPORT_APP_PRIVATE_KEY }}

  sbom:
    name: SBOM & Attestation
    if: ${{ inputs.generate_sbom }}
    needs: [maven]
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      sbom_generated: ${{ steps.generate.outputs.generated }}
    steps:
      # Only the default branch and release lines (X.Y.x maintenance branches by
      # convention, configurable via sbom_ref_pattern) attest and feed Dependency-Track.
      # Feature branches are skipped — they would otherwise overwrite the Dependency-Track
      # BOM of the release line they were cut from. PR builds (e.g. Dependabot via
      # pull_request_target, where github.ref_name is the BASE branch and would pass the
      # branch check) are skipped for the same reason.
      - name: Evaluate Branch Gate
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_PATTERN: ${{ inputs.sbom_ref_pattern }}
        run: |
          if [[ "$EVENT_NAME" == pull_request* ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PR builds do not attest or upload to Dependency-Track — skipping SBOM generation."
          elif [ "$REF_NAME" = "$DEFAULT_BRANCH" ] || echo "$REF_NAME" | grep -Eq "$REF_PATTERN"; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Branch '$REF_NAME' is neither the default branch nor matches '$REF_PATTERN' — skipping SBOM generation."
          fi

      - name: Checkout Repository
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate SBOM and Attest
        id: generate
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: uniport/workflows/.github/actions/base/generate-sbom@main
        with:
          version: ${{ needs.maven.outputs.VERSION }}
          registry: ${{ vars.STAGING_REGISTRY_DOCKER }}
          nexus-url: ${{ vars.NEXUS3_URL }}
          nexus-user: ${{ vars.NEXUS3_USER }}
          nexus-password: ${{ secrets.NEXUS3_PW }}
          staging-repo-docker: ${{ vars.STAGING_REPO_DOCKER }}
          npm-path: ${{ inputs.has_frontend && inputs.sbom_npm_path || '' }}
          cosign-private-key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}

  # Separate job: dtrack.inventage.com is only reachable from the internal network,
  # so the upload must run on a self-hosted runner (the SBOM generation itself runs
  # on cheaper GitHub-hosted runners).
  dtrack:
    name: Dependency-Track Upload
    # sbom_generated is false for repos that produce neither Docker images nor have a
    # frontend — there is nothing to upload then
    if: ${{ needs.sbom.outputs.should_run == 'true' && needs.sbom.outputs.sbom_generated == 'true' }}
    needs: [maven, sbom]
    runs-on: macduff
    steps:
      - name: Download SBOM Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom.cyclonedx.json

      - name: Upload SBOM to Dependency-Track
        uses: uniport/workflows/.github/actions/base/upload-sbom-dependency-track@main
        with:
          version: ${{ needs.maven.outputs.VERSION }}
          api-key: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          url: ${{ vars.DEPENDENCY_TRACK_URL || 'https://dtrack.inventage.com' }}
          parent-uuid: ${{ vars.DEPENDENCY_TRACK_PARENT_UUID }}
          # Only builds of the default branch mark their DT version as "latest"
          is-latest: ${{ github.ref_name == github.event.repository.default_branch }}

  tag_artifacts:
    name: Tag Artifacts
    if: ${{ inputs.tag_docker || inputs.tag_maven || inputs.tag_npm || inputs.tag_helm}}
    needs: [maven]
    uses: ./.github/workflows/shared-nexus-tag-artifacts.yml
    with:
      version: ${{ needs.maven.outputs.VERSION }}
      group_id: ${{ needs.maven.outputs.GROUP_ID }}
      tag_docker: ${{ inputs.tag_docker }}
      tag_maven: ${{ inputs.tag_maven }}
      tag_npm: ${{ inputs.tag_npm }}
      tag_helm: ${{ inputs.tag_helm }}
    secrets:
      NEXUS3_PW: ${{ secrets.NEXUS3_PW }}
