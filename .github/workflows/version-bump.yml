# Workflow for bumping the version
name: Version Bump

on:
  workflow_call:
    inputs:
      major:
        description: 'The major version in SemVer'
        type: string
        required: true
      minor:
        description: 'The minor version in SemVer'
        type: string
        required: true
      patch:
        description: 'The patch version in SemVer'
        type: string
        required: true
      branch_name:
        description: 'The branch name'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      major:
        description: 'The major version in SemVer'
        type: string
        required: true
      minor:
        description: 'The minor version in SemVer'
        type: string
        required: true
      patch:
        description: 'The patch version in SemVer'
        type: string
        required: true
      branch_name:
        description: 'The branch name'
        type: string
        required: true

env:
  SNAPSHOT_SUFFIX: SNAPSHOT

jobs:
  bump:
    name: Version Bump
    runs-on: ubuntu-latest
    permissions:
      contents: write # update version
    steps:
      - name: Setup
        id: setup
        shell: bash
        env:
          MAJOR: ${{ inputs.major }}
          MINOR: ${{ inputs.minor }}
          PATCH: ${{ inputs.patch }}
        run: |
          set -u

          NEXT_MINOR="$MINOR"
          NEXT_PATCH="$PATCH"

          if [[ "$PATCH" -eq 0 ]]; then
            NEXT_MINOR="$(( MINOR + 1 ))"
          else
            NEXT_PATCH="$(( PATCH + 1 ))"
          fi

          NEXT_VERSION="$MAJOR.${NEXT_MINOR}.${NEXT_PATCH}"

          cat >> $GITHUB_OUTPUT <<EOF  
          NEXT_VERSION=$NEXT_VERSION
          EOF

      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1 # Fetch only the latest commit
          ref: ${{ inputs.branch_name }}

      - name: Configure Git user
        env:
          ACTOR: ${{ github.actor }}
        run: |
          git config user.name "$ACTOR"
          git config user.email "$ACTOR@users.noreply.github.com"

      - name: Bump version
        uses: uniport/workflows/.github/actions/set-version@main
        with:
          version: ${{ steps.setup.outputs.NEXT_VERSION }}-${{ env.SNAPSHOT_SUFFIX }}

      - name: Commit
        env:
          NEXT_VERSION: ${{ steps.setup.outputs.NEXT_VERSION }}
        run: |
          git add $(find . -name 'pom.xml')
          git add $(find . -path '**/web/package.json') || echo "No package.json found"
          git add $(find . -path '**/web/package-lock.json') || echo "No package-lock.json found"

          # only commit if there are changes
          git diff-index --quiet HEAD || git commit \
            --no-verify \
            --message "Set version to $NEXT_VERSION"

      - name: Push
        env:
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          git push origin "$BRANCH_NAME"

      - name: Summary
        shell: bash
        env:
          MAJOR: ${{ inputs.major }}
          MINOR: ${{ inputs.minor }}
          PATCH: ${{ inputs.patch }}
          BRANCH_NAME: ${{ inputs.branch_name }}
          NEXT_VERSION: ${{ steps.setup.outputs.NEXT_VERSION }}
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Setup
          ### Inputs
          - **major**: \`$MAJOR\`
          - **minor**: \`$MINOR\`
          - **patch**: \`$PATCH\`
          - **branch_name**: \`$BRANCH_NAME\`
          ### Outputs
          - **NEXT_VERSION**: \`$NEXT_VERSION\`
          EOF
