name: Ensure Branch
description: Checks if a branch exists in the repo and aborts otherwise

inputs:
  branch:
    description: 'Branch name to check'
    required: true

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 1 # Fetch only the latest commit
        ref: ${{ github.ref }}

    - name: Check if branch exists
      id: branch_check
      env:
        BRANCH: ${{ inputs.branch }}
      run: |
        if [[ -n $(git ls-remote --heads origin "$BRANCH") ]]; then
            echo "exists=true" >> $GITHUB_OUTPUT
        else
            echo "exists=false" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Branch exists
      if: steps.branch_check.outputs.exists == 'true'
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
      run: |
        echo "Branch '$BRANCH' exists!"

    - name: Branch does NOT exists
      if: steps.branch_check.outputs.exists == 'false'
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
      run: |
        echo "Branch '$BRANCH' does NOT exist. Aborting..."
        exit 1
