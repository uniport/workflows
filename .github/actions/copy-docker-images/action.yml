name: Copy Docker Image
description: Copy multi-arch image between registries

inputs:
  source_image:
    description: 'The source image to move the docker image from'
    required: true
  source_credentials:
    description: 'The credentials for the source registry'
    required: true
  destination_image:
    description: 'The destination image to move the docker image to'
    required: true
  destination_credentials:
    description: 'The credentials for the destination registry'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Copy multi-arch docker image
      shell: bash
      env:
        SOURCE_CREDENTIALS: ${{ inputs.source_credentials }}
        DESTINATION_CREDENTIALS: ${{ inputs.destination_credentials }}
        SOURCE_IMAGE: ${{ inputs.source_image }}
        DESTINATION_IMAGE: ${{ inputs.destination_image }}
      run: |
        docker run --rm quay.io/skopeo/stable:v1 copy \
          --all \
          --src-creds "$SOURCE_CREDENTIALS" \
          --dest-creds "$DESTINATION_CREDENTIALS" \
          "docker://$SOURCE_IMAGE" "docker://$DESTINATION_IMAGE"
