name: Copy Docker Image
description: Copy multi-arch image between registries

inputs:
  source_image:
    description: 'The source image to move the docker image from'
    required: true
  source_credentials:
    description: 'The credentials for the source registry'
    required: true
  destination_image:
    description: 'The destination image to move the docker image to'
    required: true
  destination_credentials:
    description: 'The credentials for the destination registry'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Copy multi-arch docker image and attestations
      shell: bash
      env:
        SRC: ${{ inputs.source_image }}
        DST: ${{ inputs.destination_image }}
        SRC_CREDS: ${{ inputs.source_credentials }}
        DST_CREDS: ${{ inputs.destination_credentials }}
      run: |
        set -euo pipefail
        # Pinned by digest since this runs with registry credentials; the tag documents the
        # release the digest belongs to. Bump both together
        # (docker buildx imagetools inspect quay.io/skopeo/stable:<tag>).
        skopeo() { docker run --rm quay.io/skopeo/stable:v1.22.2@sha256:c7d3c512612f52805023cd38351081dad7e2729fc13d14b701e47c7c8bdd6615 "$@"; }

        skopeo copy --all \
          --src-creds "$SRC_CREDS" --dest-creds "$DST_CREDS" \
          "docker://$SRC" "docker://$DST"

        # Cosign stores SBOM/provenance attestations and signatures as sibling tags of the
        # image (sha256-<digest>.att / .sig). Carry them along so the mirrored image stays
        # verifiable. Images without attestations are copied as before.
        DIGEST="$(skopeo inspect --format '{{.Digest}}' --creds "$SRC_CREDS" "docker://$SRC")"
        for suffix in att sig; do
          ATTACHMENT_TAG="${DIGEST/:/-}.${suffix}"
          ATTACHMENT_SRC="${SRC%:*}:${ATTACHMENT_TAG}"
          ATTACHMENT_DST="${DST%:*}:${ATTACHMENT_TAG}"

          if ! skopeo inspect --raw --creds "$SRC_CREDS" "docker://$ATTACHMENT_SRC" >/dev/null 2>&1; then
            echo "No ${suffix} attachment for ${SRC}, skipping"
            continue
          fi

          echo "Copying ${suffix} attachment ${ATTACHMENT_SRC} to ${ATTACHMENT_DST}…"
          skopeo copy \
            --src-creds "$SRC_CREDS" --dest-creds "$DST_CREDS" \
            "docker://$ATTACHMENT_SRC" "docker://$ATTACHMENT_DST"
        done
