name: Send Rocket.Chat Message
description: 'Sends a Rocket.Chat Message via Webhook'
inputs:
  webhook_url:
    description: 'The Rocket.Chat webhook URL'
    required: true
  channel:
    description: 'The channel to send the message to (optional)'
    required: false
  message:
    description: 'The message to send'
    required: true

runs:
  using: 'composite'
  steps:
    # No need to install Node as it is available on all GitHub runners…
    - name: Send Rocket.Chat message
      shell: bash
      env:
        WEBHOOK_URL: ${{ inputs.webhook_url }}
        CHANNEL: ${{ inputs.channel }}
        MESSAGE: ${{ inputs.message }}
      run: |
        node "$GITHUB_ACTION_PATH/send-rocketchat-message.mjs" "$WEBHOOK_URL" "$CHANNEL" "$MESSAGE"
